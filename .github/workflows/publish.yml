name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
          scope: "@deathbycode"

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - run: pnpm -r test

      - run: npm install -g npm@latest

      - run: pnpm -r --filter "./packages/core" --filter "./packages/sweden" publish --provenance --access public --no-git-checks
